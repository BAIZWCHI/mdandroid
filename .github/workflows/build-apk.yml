name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22' # 已升级至 Node.js 22 以满足依赖要求

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install dependencies and build
      run: |
        cd frontend
        npm install
        npm run build

    - name: Setup and Sync Capacitor
      run: |
        cd frontend
        # 1. 安装核心、CLI 以及缺失的 Android 平台支持包
        npm install @capacitor/core @capacitor/cli @capacitor/android
        
        # 2. 强制初始化 Capacitor 配置（赋予 App 名称和包名，并指定前端打包产物目录）
        npx cap init "MDAndroidApp" "com.mdandroid.app" --web-dir dist
        
        # 3. 添加 Android 平台并同步代码
        npx cap add android
        npx cap sync android

    - name: Build APK
      run: |
        cd frontend/android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
