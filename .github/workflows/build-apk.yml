name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install dependencies and build
      run: |
        cd frontend
        npm install
        npm run build

    - name: Setup and Sync Capacitor
      run: |
        cd frontend
        # 1. 强制安装 Capacitor 核心依赖和命令行工具
        npm install @capacitor/core @capacitor/cli
        # 2. 尝试添加 Android 原生平台文件夹（如果已经存在则跳过报错）
        npx cap add android || true
        # 3. 将前端网页代码同步到 Android 文件夹中
        npx cap sync android

    - name: Build APK
      run: |
        cd frontend/android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
