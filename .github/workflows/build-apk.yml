name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21' # 已升级至 Java 21 以满足安卓编译需求

    - name: Install dependencies and build
      run: |
        cd frontend
        npm install
        npm run build

    - name: Setup and Sync Capacitor
      run: |
        cd frontend
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "MDAndroidApp" "com.mdandroid.app" --web-dir dist
        npx cap add android
        npx cap sync android

    - name: Build APK
      run: |
        cd frontend/android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
